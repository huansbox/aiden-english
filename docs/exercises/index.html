  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }

    .back { font-size: 0.9rem; }
    .list { list-style: none; padding: 0; }
    .list li { margin: 0.5rem 0; }
    .list a { display: flex; align-items: center; justify-content: space-between;
              padding: 1rem 1.2rem; background: #f9fafb; border: 1px solid #e5e7eb;
              border-radius: 8px; text-decoration: none; color: inherit; font-size: 1.1rem; }
    .list a:hover { background: #f3f4f6; }
    .score-badge { font-size: 0.9rem; font-weight: 700; padding: 0.2rem 0.6rem;
                   border-radius: 6px; white-space: nowrap; flex-shrink: 0; margin-left: 0.5rem; }
    .score-badge.perfect { background: #ecfdf5; color: #059669; }
    .score-badge.partial { background: #fef3c7; color: #b45309; }

</head>

  <script>
    document.querySelectorAll(".list a").forEach(function (a) {
      var key = "quiz-" + a.getAttribute("href").replace(".html", "");
      var data = JSON.parse(localStorage.getItem(key) || "null");
      if (!data) return;
      var badge = document.createElement("span");
      badge.className = "score-badge " + (data.score === data.total ? "perfect" : "partial");
      badge.textContent = data.score + "/" + data.total;
      a.appendChild(badge);
    });
